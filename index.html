<!-- 备注：塞内加尔项目-顾问分配版-沃洛夫语(Wolof)版 -->
<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wout mbalane</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: #ffffff; 
        }
        .card { 
            text-align: center; 
            width: 90%; 
            max-width: 360px; 
            padding: 25px; 
            box-sizing: border-box; 
        }
        
        .top-icon { 
            width: 70px; 
            height: 70px; 
            background: #E8F5E9; 
            color: #2E7D32; 
            font-size: 35px; 
            line-height: 70px; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .title { 
            font-size: 22px; 
            font-weight: bold; 
            color: #1a1a1a; 
            margin-bottom: 20px; 
        }
        
        .desc { 
            font-size: 16px; 
            color: #444; 
            line-height: 1.8; 
            margin-bottom: 30px; 
            text-align: center; 
        }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #25D366; 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 19px; 
            box-shadow: 0 4px 15px rgba(37,211,102,0.3); 
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }

        .btn:before { 
            content: '💬'; 
            margin-right: 10px; 
            font-size: 20px; 
        }
        
        .busy-note { 
            font-size: 13px; 
            color: #d32f2f; 
            margin-top: 30px; 
            background: #fff5f5; 
            padding: 12px; 
            border-radius: 10px; 
            line-height: 1.6; 
            border: 1px dashed #feb2b2;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-icon">👋</div>

        <!-- 标题：你还在犹豫吗？ -->
        <div class="title">Ndax yaangi xalaat ba léegi?</div>
        
        <!-- 正文：沃洛夫语口语化 -->
        <div class="desc">
            Loolu du problem... Mën nga nu jokkoo ci <br>
            <b>WhatsApp</b> ngir am yeneeni leeral. <br><br>
            Mën na nekk ocaas bu baax ci yaw ci biir kanam.
        </div>
        
        <!-- 更新后的分流链接 -->
        <a href="https://fast.klfms.top/HRTu1x" class="btn">JOKKOO AK NU LÉEGI</a>
        
        <!-- 底部提示 -->
        <div class="busy-note">
            ⚠️ <b>Nitt ñi ñu ngi nuy jokkoo bu baax!</b> <br>
            Su fekkentene mënul dëpp, bësal butoŋ bi ñaar walla ñetti yoon.
        </div>
    </div>
</body>
</html>
